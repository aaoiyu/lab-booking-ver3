<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>機器予約システム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow">

  <style>
    :root{
      --bg:#f6f7fb; --bg-grad-1:#f7f9ff; --bg-grad-2:#f2f6ff;
      --card:#fff; --ink:#0f172a; --muted:#6b7280;
      --primary:#2563eb; --primary-weak:#e3ecff; --primary-ring:rgba(37,99,235,.28);
      --danger:#ef4444; --ok:#16a34a;
      --radius:16px; --shadow:0 8px 24px rgba(16,24,40,.12);
      --shadow-sm:0 6px 14px rgba(16,24,40,.10);
      --shadow-lg:0 14px 40px rgba(16,24,40,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--ink);
      background:
        radial-gradient(1200px 800px at 80% -10%, var(--bg-grad-1), transparent 60%),
        radial-gradient(1000px 700px at -10% 20%, var(--bg-grad-2), transparent 60%),
        var(--bg);
    }
    header{padding:20px; background:linear-gradient(180deg,#fff,#f7f7fb); border-bottom:1px solid #eee; position:sticky; top:0; z-index:10;}
    .wrap{max-width:1100px; margin:0 auto; padding:20px;}
    .toolbar{display:grid; gap:12px; grid-template-columns:1fr 1fr 1fr;}
    .toolbar .card{grid-column:span 3;}
    .card{background:var(--card); border:1px solid #eee; border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; animation:fadeUp .24s ease both;}
    .card:hover{transform:translateY(-1px); box-shadow:var(--shadow-lg); border-color:rgba(0,0,0,.06);}
    h1{font-size:26px; margin:0 0 6px;} .sub{color:var(--muted); font-size:13px;}
    .form{display:grid; gap:12px; grid-template-columns:1fr 1fr 1fr 1fr 1fr; align-items:end;}
    label{font-size:12px; color:var(--muted); display:block; margin-bottom:6px;}
    input[type="text"],input[type="password"],select,input[type="date"],textarea{
      width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:12px; background:#fff; font-size:14px; outline:none;
    }
    input:focus,select:focus,textarea:focus{border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-ring);}
    button{appearance:none; border:0; padding:11px 14px; border-radius:12px; font-weight:600; cursor:pointer;}
    .btn-primary{background:var(--primary); color:#fff;}
    .btn-ghost{background:#fff; border:1px solid #e5e7eb; color:#111827;}
    .btn-danger{background:var(--danger); color:#fff;}
    .btn-primary:disabled{background:#9ca3af; cursor:not-allowed; opacity:.7;}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .error{color:var(--danger); font-size:13px;}
    .ok{color:var(--ok); font-size:13px;}
    .help{font-size:12px; color:var(--muted);}
    .grid{display:grid; gap:16px; margin-top:16px; grid-template-columns:repeat(2, 1fr);}
    @media (max-width:900px){ .toolbar{grid-template-columns:1fr;} .form{grid-template-columns:1fr 1fr;} .grid{grid-template-columns:1fr;} }
    .room-card h3{margin:0 0 8px 0; font-size:18px;}
    .empty{color:var(--muted); font-size:14px;}
    .resv-list{display:flex; flex-direction:column; gap:10px;}
    .resv{border:1px solid #eee; border-radius:12px; padding:10px 12px; background:#fff; display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; animation:fadeUp .24s ease both;}
    .resv:hover{box-shadow:var(--shadow-sm);}
    .resv .meta{font-size:13px; color:var(--muted);} .resv .title{font-weight:600;}
    .resv .actions{display:flex; gap:8px;}
    .badge{display:inline-flex; align-items:center; justify-content:center; font-size:12px; padding:2px 8px; border-radius:999px; background:#eef2ff; color:#1e40af; border:1px solid #c7d2fe; font-weight:600;}
    .timeline{position:relative; height:30px; border:1px dashed #e5e7eb; border-radius:12px; overflow:hidden; background:#fbfdff;}
    .block{position:absolute; top:0; bottom:0; border-radius:8px; background:linear-gradient(90deg, var(--primary-weak), rgba(59,130,246,.18)); border:1px solid rgba(37,99,235,.18); display:flex; align-items:center; justify-content:center; font-size:11px; color:#1f2937; white-space:nowrap; padding:0 6px; font-weight:600;}
    .scale{display:flex; justify-content:space-between; font-size:10px; color:#9ca3af; margin-top:6px;}

    /* タイムライン＋予約画像プレビュー */
    .tl-wrap{position:relative;}
    .tl-preview{
      position:absolute; bottom:calc(100% + 8px); left:0; width:220px; max-height:160px; object-fit:cover;
      border-radius:10px; border:1px solid #e5e7eb; background:#fff; box-shadow:0 10px 24px rgba(16,24,40,.18); display:none; z-index:5;
    }
    .tl-wrap:hover .tl-preview{display:block;}
    .tl-preview[hidden]{display:none !important;}

    /* 更新丸矢印 */
    .btn-refresh { background: #fff; border: 1px solid #ddd; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .btn-refresh:hover { background: #f3f4f6; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-refresh.spin { animation: spin .8s linear infinite; }

    /* 機器ヘッダ */
    .room-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px;}
    .room-head-left{display:flex; align-items:center; gap:8px;}

    /* 画像ボタン（🖼 + 文言） */
    /* 置き換え（または追記） */
    .img-btn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      font-size:14px;
      line-height:1;            /* ← ここが効きます */
    }
    .img-btn svg{
      width:18px; height:18px;
      display:block;            /* ベースラインの影響を受けない */
    }
    .img-btn[disabled]{opacity:.5; cursor:not-allowed;}

    /* ローディング・オーバーレイ */
    .loading-overlay{position:fixed; inset:0; display:none; align-items:center; justify-content:center; background: radial-gradient(400px 300px at 70% 30%, rgba(37,99,235,.06), transparent 60%), rgba(255,255,255,.6); z-index:100000;}
    .loading-box{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:18px 20px; border-radius:16px; background:rgba(255,255,255,.7); box-shadow:var(--shadow);}
    .spinner{width:44px; height:44px; border-radius:50%; border:3px solid #e5e7eb; border-top-color:var(--primary); animation:spin .9s linear infinite;}
    .loading-text{margin-top:12px; font-size:15px; color:#374151; text-align:center;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

    /* 右下メニュー（既存そのまま） */
    .fab-menu{position:fixed; right:16px; bottom:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; width:90px; height:72px; border-radius:20px; border:1px solid #e5e7eb; background:rgba(255,255,255,.7); cursor:pointer; user-select:none; z-index:10001; box-shadow:0 8px 24px rgba(16,24,40,.14); backdrop-filter:blur(8px);}
    .fab-menu:active{background:#f3f4f6; transform:scale(.98);} .menu-icon{font-size:32px; line-height:1;} .menu-label{font-size:15px; color:#6b7280;}
    .menu-overlay{position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; z-index:10000;} .menu-overlay.open{display:block;}
    .menu-drawer{position:fixed; top:0; right:-360px; width:min(92vw,340px); height:100vh; background:rgba(255,255,255,.8); backdrop-filter:blur(10px); box-shadow:-20px 0 40px rgba(16,24,40,.18); border-left:1px solid #e5e7eb; display:flex; flex-direction:column; opacity:0; transition:right .22s ease, opacity .22s ease;}
    .menu-overlay.open .menu-drawer{right:0; opacity:1;}
    .menu-title{position:sticky; top:0; z-index:1; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px 14px; background:rgba(255,255,255,.9); border-bottom:1px solid rgba(0,0,0,.06); margin:0; font-size:14px; color:#6b7280;}
    .menu-close{appearance:none; border:1px solid #e5e7eb; background:#fff; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; width:36px; height:32px; padding:0; line-height:1; font-size:20px; cursor:pointer;}
    .menu-vertical{height:calc(100vh - 56px); display:flex; flex-direction:column; gap:8px; padding:12px; overflow:auto; -webkit-overflow-scrolling:touch;}
    .menu-item{width:100%; display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid #e5e7eb; border-radius:12px; background:#fff; cursor:pointer; font-size:14px;}
    .menu-item:hover{background:#f9fafb;} .menu-item:active{background:#f3f4f6; transform:scale(.99);}
    .menu-key{min-width:22px; height:22px; border-radius:999px; display:flex; align-items:center; justify-content:center; border:1px solid #e5e7eb; background:#fff; font-weight:600; font-size:12px; color:#374151;}
    .mi{width:20px; height:20px; display:inline-flex; align-items:center; justify-content:center;}
    .mi svg{width:18px; height:18px; stroke:#374151; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}

    /* 画像モーダル */
    .modal{display:none; position:fixed; inset:0; z-index:20000; background:rgba(0,0,0,.6); align-items:center; justify-content:center;}
    .modal-body{position:relative; max-width:min(90vw, 1000px); max-height:90vh; background:#fff; border-radius:12px; padding:12px; box-shadow:0 10px 30px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center;}
    .modal-body{ padding-top:20px; padding-right:20px; }
    .modal-img-wrap{position:relative; min-width:200px; min-height:120px; display:flex; align-items:center; justify-content:center;}
    .modal-body img{
      max-width: 80vw;   /* 横幅の最大値（画面幅の 80%） */
      max-height: 70vh;  /* 縦幅の最大値（画面高さの 70%） */
      min-width: 300px;  /* 最小横幅（バランスを取る） */
      min-height: 200px; /* 最小縦幅 */
      border-radius: 8px;
      object-fit: contain; /* アスペクト比を保ちながら枠に収める */
      background: #fff;    /* 空き部分を白背景に */
      
    }
    /* 置き換え（または追記） */
    .modal-close{
      position:absolute;
      top:8px;                  /* 内側に固定 */
      right:8px;                /* 内側に固定 */
      width:48px; height:48px;
      border:none; border-radius:50%;
      background:#fff;
      display:flex;             /* ボタン内で中央寄せ */
      align-items:center;
      justify-content:center;  
      cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.25);
      font-size:0;
      color:transparent; 
      line-height:1;
    }
    .modal-close{ font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    /* 疑似要素をアイコン枠として中央配置 */
    .modal-close::before{
      content:"";
      width:32px; height:32px; display:block;
      background-color:#111;            /* ×の色（お好みで） */
      /* SVGの×をマスクとして適用（常に中央＆等倍） */
      -webkit-mask: url('data:image/svg+xml;utf8,\<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">\<path d="M6 6L18 18M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round"/>\</svg>') 
      center/contain no-repeat;
      mask: url('data:image/svg+xml;utf8,\<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">\<path d="M6 6L18 18M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round"/>\</svg>') 
      center/contain no-repeat;
    }
    .modal-loading{position:absolute; inset:auto; bottom:8px; left:50%; transform:translateX(-50%); display:none; align-items:center; gap:8px; font-size:13px; color:#374151;}
    .modal-loading .spinner{width:20px; height:20px; border-width:2px;}
    .modal-error{display:none; font-size:14px; color:#ef4444; margin-top:6px; text-align:center;}
  </style>
</head>

<body>

</header>

  <!-- 右下：浮遊メニューボタン（既存のまま） -->
  <button id="menuToggle" class="fab-menu" aria-expanded="false" aria-controls="menuOverlay" aria-label="メニューを開閉">
    <div id="menuIcon" class="menu-icon">☰</div>
    <div id="menuText" class="menu-label">メニュー</div>
  </button>

        <button class="menu-item" id="menuB"><span class="mi"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg></span><span class="menu-key">B</span><span>更新</span></button>
        <button class="menu-item" id="menuC"><span class="mi"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><rect x="6" y="6" width="12" height="14" rx="2"/></svg></span><span class="menu-key">C</span><span>この日の全削除（管理者）</span></button>
        <button class="menu-item" id="menuD"><span class="mi"><svg viewBox="0 0 24 24"><path d="M8 9l-4 3 4 3"/><path d="M16 9l4 3-4 3"/><path d="M12 20l4-16"/></svg></span><span class="menu-key">D</span><span>この日のJSONを見る（デバッグ）</span></button>

  <main class="wrap">
    <div class="toolbar">
      <div class="card">
        <div class="form" id="form">
          <div><label>日付</label><input type="date" id="date"></div>

  <script>
    /* ========= 設定 ========= */
    const API_BASE   = "https://script.google.com/macros/s/AKfycbxhmRVsm97p_A1SVzXcI8IMyCz0TPpfeLCXOPFmV3ODBLa15iDrIXDQEAGlsRbsFYo/exec";
    const PASS_HASH  = "622f39f7b19b05f92e2e23c19ec2a73484b67f74fbcd8a20a5f365e59936bb65";
    const ROOMS      = ["Thermal Cycler Wako WK-0232","Thermal Cycler ASTEC GeneAtlas 482","リアルタイムPCR","動物細胞培養室 | クリーンベンチ","実験室 | クリーンベンチ"];
    const SLOT_MIN   = 15, DAY_START_MIN = 8*60, DAY_END_MIN = 20*60;
    const GATE_KEY   = "room-pass-ok", REMEMBER_DAYS = 7;

    /* 機器ごとの代表画像（Google Drive は「共有→リンクを知っている全員が閲覧可」に） */
    const ROOM_IMAGES = {
      "Thermal Cycler Wako WK-0232":       "https://drive.google.com/thumbnail?id=1Gn27zv-VFZKsQbFs19ts-eJNepHOv4m6",    //https://drive.google.com/file/d/1Gn27zv-VFZKsQbFs19ts-eJNepHOv4m6/view?usp=sharing
      "Thermal Cycler ASTEC GeneAtlas 482":"https://drive.google.com/thumbnail?id=1xydznaObhr0Ij2OLJk0d2NfGFXo_GHfM",    //https://drive.google.com/file/d/1xydznaObhr0Ij2OLJk0d2NfGFXo_GHfM/view?usp=sharing
      "リアルタイムPCR":                    "https://drive.google.com/thumbnail?id=13lA0P8xF8evITg8QWewqKFAyGACqKW2d",    //https://drive.google.com/file/d/13lA0P8xF8evITg8QWewqKFAyGACqKW2d/view?usp=sharing
      "動物細胞培養室 | クリーンベンチ":   "",
      "実験室 | クリーンベンチ":   ""
    };

    /* ========= Util ========= */
    const $ = q => document.querySelector(q);
    const el = (t, p = {}, c = []) => {
      const n = document.createElement(t);
      Object.entries(p).forEach(([k, v]) => {
        if (v === null || v === undefined || v === false) return;
        if (k === "class") n.className = v;
        else if (k === "style") Object.assign(n.style, v);
        else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.substring(2).toLowerCase(), v);
        else if (v === true) n.setAttribute(k, "");
        else n.setAttribute(k, v);
      });
      (Array.isArray(c) ? c : [c]).forEach(x => { if (x!==null && x!==undefined) n.appendChild(typeof x==="string"?document.createTextNode(x):x); });
      return n;
    };
    const toHHMM   = m => `${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
    const fromHHMM = s => { const [h,mi]=s.split(":").map(Number); return h*60+mi; };
    const todayStr = () => new Date().toISOString().slice(0,10);
    const uid      = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    async function sha256Hex(t){const e=new TextEncoder().encode(t),b=await crypto.subtle.digest("SHA-256",e);return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");}
    function normalizeDigits(s){return (s||"").replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).trim();}
    function getQueryDate(){const u=new URL(location.href);return u.searchParams.get("date");}
    function setQueryDate(d){const u=new URL(location.href);u.searchParams.set("date",d);history.replaceState(null,"",u.toString());}
    function showMsg(text,type="help"){ const e=$("#msg"); e.className = type==="error"?"error":(type==="ok"?"ok":"help"); e.textContent = text||""; }
    function setLoading(on,message="反映中…"){const box=$("#loading"); const label=box?.querySelector(".loading-text"); if(label) label.textContent=message; if(!box)return; box.style.display=on?"flex":"none";}
    function hasConflict(list,s,e){return list.some(b=>!(e<=b.start||s>=b.end));}

    /* ★ Google DriveのURLを画像直リンク(高解像度)へ最適化 */
    function toBestDriveUrl(url){
      if(!url) return "";
      // 1) file/d/{id}/view?... → uc?export=view&id={id}
      const m = url.match(/\/file\/d\/([^/]+)\//);
      if(m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
      // 2) thumbnail?id=... → 高解像度化
      const t = url.match(/[?&]id=([^&]+)/);
      if(url.includes("/thumbnail") && t) return `https://drive.google.com/thumbnail?id=${t[1]}&sz=w2000`;
      // 3) 既に uc?export=view&id=...
      return url;
    }

    /* ========= API ========= */
    async function apiList(date){ const url = `${API_BASE}?action=list&date=${encodeURIComponent(date)}&_=${Date.now()}`; const r = await fetch(url, { cache:"no-store" }); return await r.json(); }
    async function apiAdd(payload){ const r=await fetch(API_BASE,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"add",payload})}); return await r.json(); }
    async function apiCancel(obj){ const r=await fetch(API_BASE,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"cancel",...obj})}); return await r.json(); }
    async function apiClearDay(obj){ const r=await fetch(API_BASE,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"clearDay",...obj})}); return await r.json(); }

    /* ========= UI要素 ========= */
    const dateInput=$("#date"), roomSelect=$("#room"), startSelect=$("#start"), endSelect=$("#end");
    const nameInput=$("#name"), pinInput=$("#pin"), noteInput=$("#note");
    const addBtn=$("#addBtn"), clearDayBtn=$("#clearDayBtn"), roomsContainer=$("#rooms");

    function fillRooms(){ roomSelect.innerHTML=""; ROOMS.forEach(r=>roomSelect.appendChild(el("option",{value:r},r))); }
    function fillTimes(){
      startSelect.innerHTML=""; endSelect.innerHTML="";
      for(let m=DAY_START_MIN;m<=DAY_END_MIN-SLOT_MIN;m+=SLOT_MIN) startSelect.appendChild(el("option",{value:toHHMM(m)},toHHMM(m)));
      for(let m=DAY_START_MIN+SLOT_MIN;m<=DAY_END_MIN;m+=SLOT_MIN) endSelect.appendChild(el("option",{value:toHHMM(m)},toHHMM(m)));
      startSelect.value=toHHMM(9*60); endSelect.value=toHHMM(10*60);
    }

    /* タイムライン */
    function renderTimeline(blocks){
      const total=DAY_END_MIN-DAY_START_MIN, tl=el("div",{class:"timeline"});
      blocks.forEach(b=>{
        const left=(b.start-DAY_START_MIN)/total*100, width=(b.end-b.start)/total*100;
        tl.appendChild(el("div",{class:"block",style:{left:`${left}%`,width:`${width}%`}},`${toHHMM(b.start)}-${toHHMM(b.end)}`));
      });
      const labels=[]; for(let h=DAY_START_MIN/60;h<=DAY_END_MIN/60;h++) labels.push(el("span",{},String(h)));
      return el("div",{},[tl,el("div",{class:"scale"},labels)]);
    }

    /* タイムライン＋予約画像（ホバーでプレビュー） */
    function makeTimelineWithPreview(item){
      const tl = renderTimeline([item]);
      if(!item.img) return el("div",{class:"tl-wrap"},[tl]);
      const img = el("img",{class:"tl-preview",src:item.img,alt:item.name||"予約画像",loading:"lazy",onerror:(e)=>e.target.setAttribute("hidden","true")});
      return el("div",{class:"tl-wrap"},[tl,img]);
    }

    

    /* 1日分レンダリング（機器カード + 画像ボタン） */
    async function renderDay(){
      const date = dateInput.value;
      setQueryDate(date);
      roomsContainer.innerHTML = "";

      const res = await apiList(date);
      if (!res.ok){ roomsContainer.textContent = "データ取得に失敗しました: " + res.error; return; }

      const items = res.items || [];
      const roomsToShow = Array.from(new Set([...ROOMS, ...items.map(it => it.room)]));

      roomsToShow.forEach(room => {
        const list = items.filter(it => it.room === room).sort((a,b)=>a.start-b.start);

        // 代表画像（優先：ROOM_IMAGES > その日の予約img）
        const baseUrl = ROOM_IMAGES[room] || (list.find(it => it.img)?.img) || "";
        const roomImgUrl = toBestDriveUrl(baseUrl);

        // 🖼 画像ボタン（SVGアイコン）
        const imgBtn = el("button", {
          class: "btn-ghost img-btn",
          title: roomImgUrl ? "機器画像を表示" : "画像がありません",
          "aria-label": roomImgUrl ? "機器画像を表示" : "画像がありません",
          onclick: () => { if(roomImgUrl) openImageModal(roomImgUrl, room); },
          disabled: roomImgUrl ? null : true
        }, [
          // アイコン
          el("span", { "aria-hidden":"true" }, (() => {
            const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
            s.setAttribute("viewBox","0 0 24 24");
            s.innerHTML='<rect x="3" y="4" width="18" height="14" rx="2"></rect><path d="M8 13l2.5-2.5L14 14l2-2 3 3"></path><circle cx="9" cy="9" r="1.5"></circle>';
            s.style.width="18px"; s.style.height="18px"; s.style.stroke="#374151"; s.style.fill="none"; s.style.strokeWidth="2"; s.style.strokeLinecap="round"; s.style.strokeLinejoin="round";
            return s;
          })()),
          document.createTextNode("画像")
        ]);

        const head = el("div", { class: "room-head" }, [
          el("div", { class: "room-head-left" }, [
            el("h3", {}, room),
            roomImgUrl ? el("span", { class: "badge", title: "この機器には画像があります" }, "画像あり") : null
          ]),
          imgBtn
        ]);

        const body = (list.length === 0)
          ? el("div", { class: "empty" }, "予約はありません")
          : el("div", { class: "resv-list" }, list.map(item =>
              el("div", { class: "resv" }, [
                el("div", {}, [
                  el("div", { class: "title" }, `${toHHMM(item.start)} - ${toHHMM(item.end)}　${item.name}`),
                  el("div", { class: "meta" }, item.note || " "),
                  makeTimelineWithPreview(item)
                ]),
                el("div", { class: "actions" }, [
                  el("span", { class: "badge" }, `ID: ${(item.id || "------").slice(0, 6)}`),
                  el("button", { class: "btn-danger", onclick: () => cancelBooking(date, item.id) }, "キャンセル")
                ])
              ])
            ));

        const dayTl = el("div", { style: { marginTop: "10px" } }, [
          el("div", { class: "sub" }, "この機器の当日タイムライン"),
          renderTimeline(list)
        ]);

        roomsContainer.appendChild(el("div", { class: "card room-card" }, [head, body, dayTl]));
      });
    }

    /* ========= 予約操作 ========= */
    async function addBooking(){
      const date=dateInput.value, room=roomSelect.value, name=nameInput.value.trim(), note=noteInput.value.trim();
      const start=fromHHMM(startSelect.value), end=fromHHMM(endSelect.value);
      const pinRaw=normalizeDigits(pinInput.value||"");

      if(!date){ showMsg("日付を選択してください","error"); return; }
      if(!name){ showMsg("氏名は必須です","error"); return; }
      if(end<=start){ showMsg("終了は開始より後に","error"); return; }
      if(!/^\d{4}$/.test(pinRaw)){ showMsg("PINは4桁数字","error"); return; }

      setLoading(true,"予約を追加しています…");
      try{
        const pinHash = await sha256Hex(pinRaw);
        const cur = await apiList(date);
        if(!cur.ok){ showMsg("サーバ取得失敗: "+cur.error,"error"); return; }
        const list = cur.items.filter(it=>it.room===room);
        if(hasConflict(list,start,end)){ showMsg("時間が重複しています","error"); return; }

        const res = await apiAdd({date,room,start,end,name,note,id:uid(),pinHash,createdAt:Date.now()});
        if(!res.ok){ showMsg("追加失敗: "+res.error,"error"); return; }

        pinInput.value=""; noteInput.value="";
        showMsg("追加しました","ok");
        await renderDay();
      } finally { setLoading(false); }
    }

    async function cancelBooking(date,id){
      let pinTry = prompt("キャンセル用の4桁PINを入力してください");
      if(pinTry===null) return;
      pinTry = normalizeDigits(pinTry);

      setLoading(true,"キャンセルしています…");
      try{
        let pinHashTry=null, adminHash=null;
        if(/^\d{4}$/.test(pinTry)) pinHashTry = await sha256Hex(pinTry); else adminHash = await sha256Hex(pinTry);
        const res = await apiCancel({date,id,pinHashTry,adminHash});
        if(res.ok){ showMsg("キャンセルしました","ok"); await renderDay(); }
        else{ alert("キャンセル失敗: "+res.error); }
      } finally { setLoading(false); }
    }

    async function clearDay(){
      const date=dateInput.value;
      if(!confirm(`${date} の全予約を削除します。よろしいですか？`)) return;
      const adminTry = prompt("管理者パスコードを入力してください");
      if(adminTry===null) return;

      setLoading(true,"この日の予約を削除しています…");
      try{
        const adminHash = await sha256Hex(normalizeDigits(adminTry));
        const res = await apiClearDay({date,adminHash});
        if(res.ok){ showMsg("この日の予約を全て削除しました","ok"); await renderDay(); }
        else{ alert("全削除失敗: "+res.error); }
      } finally { setLoading(false); }
    }

    /* ========= 入力バリデーション ========= */
    function validateForm(){
      const date=dateInput.value, name=nameInput.value.trim(), pin=pinInput.value.trim();
      const start=startSelect.value, end=endSelect.value;
      const pinOk=/^\d{4}$/.test(pin);
      const timeOk=start && end && fromHHMM(end)>fromHHMM(start);
      addBtn.disabled = !(date && name && pinOk && timeOk);
    }
    [dateInput, nameInput, pinInput, startSelect, endSelect].forEach(x=>{ x.addEventListener("input",validateForm); x.addEventListener("change",validateForm); });

    /* ========= メニュー ========= */
    const menuToggle=$("#menuToggle"), menuIcon=$("#menuIcon"), menuText=$("#menuText"), menuOverlay=$("#menuOverlay"), menuDrawer=$("#menuDrawer"), menuClose=$("#menuClose");
    function setMenuOpen(open){
      menuToggle.setAttribute("aria-expanded", open ? "true" : "false");
      if(open){ menuIcon.textContent="×"; menuText.textContent="閉じる"; menuOverlay.classList.add("open"); menuOverlay.setAttribute("aria-hidden","false"); setTimeout(()=>menuDrawer?.focus?.(),0); }
      else{ menuIcon.textContent="☰"; menuText.textContent="メニュー"; menuOverlay.classList.remove("open"); menuOverlay.setAttribute("aria-hidden","true"); }
    }
    menuToggle?.addEventListener("click",()=>{ const open=menuToggle.getAttribute("aria-expanded")==="true"; setMenuOpen(!open); });
    menuClose?.addEventListener("click",()=>setMenuOpen(false));
    menuOverlay?.addEventListener("click",(e)=>{ if(e.target===menuOverlay) setMenuOpen(false); });
    document.addEventListener("keydown",(e)=>{ if(e.key==="Escape" && menuOverlay?.classList.contains("open")) setMenuOpen(false); });

    const MENU_ACTIONS = {
      A: async ()=>{ $("#date").value=todayStr(); setQueryDate($("#date").value); setLoading(true,"今日を読み込み中…"); try{ await renderDay(); showMsg("今日を表示しました","ok"); } finally{ setLoading(false);} },
      B: async ()=>{ setLoading(true,"更新中…"); try{ await renderDay(); showMsg("更新しました","ok"); } finally{ setLoading(false);} },
      C: async ()=>{ await clearDay(); },
      D: async ()=>{ const res = await apiList($("#date").value); alert(JSON.stringify(res,null,2)); },
      E: async ()=>{ const d=new Date($("#date").value||todayStr()); d.setDate(d.getDate()-1); const s=d.toISOString().slice(0,10); $("#date").value=s; setQueryDate(s); setLoading(true,"前日を読み込み中…"); try{ await renderDay(); showMsg("前日に移動しました","ok"); } finally{ setLoading(false);} },
      F: async ()=>{ const d=new Date($("#date").value||todayStr()); d.setDate(d.getDate()+1); const s=d.toISOString().slice(0,10); $("#date").value=s; setQueryDate(s); setLoading(true,"翌日を読み込み中…"); try{ await renderDay(); showMsg("翌日に移動しました","ok"); } finally{ setLoading(false);} },
      G: async ()=>{ const d=new Date($("#date").value||todayStr()); d.setDate(1); const s=d.toISOString().slice(0,10); $("#date").value=s; setQueryDate(s); setLoading(true,"今月のはじめを読み込み中…"); try{ await renderDay(); showMsg("今月のはじめに移動しました","ok"); } finally{ setLoading(false);} },
      H: async ()=>{ const url=new URL(location.href); const date=$("#date").value||todayStr(); url.searchParams.set("date",date); await navigator.clipboard.writeText(url.toString()); showMsg("この日のURLをコピーしました","ok"); },
      I: async ()=>{},
      J: ()=>{ alert(["A: 今日を表示","B: 更新","C: この日の全削除（管理者）","D: この日のJSONを見る（デバッグ）","E: 前日へ / F: 翌日へ","G: 今月1日にジャンプ","H: この日のURLをコピー","I: 予備","J: ヘルプ"].join("\n")); }
    };
    for(const key of "ABCDEFGHIJ"){ const btn=document.getElementById("menu"+key); if(!btn) continue; btn.addEventListener("click", async ()=>{ setMenuOpen(false); const fn=MENU_ACTIONS[key]; if(typeof fn==="function"){ try{ await fn(); } catch(e){ console.error(e); } } }); }

    /* ========= イベント ========= */
    dateInput.addEventListener("change",()=>{ renderDay(); showMsg(""); });
    $("#debugBtn").addEventListener("click", async ()=>{ const res=await apiList($("#date").value); alert(JSON.stringify(res,null,2)); });
    $("#refreshBtn").addEventListener("click", async ()=>{
      const btn=$("#refreshBtn");
      try{ btn.classList.add("spin"); setLoading(true,"更新中…"); await renderDay(); showMsg("更新しました","ok"); }
      finally{ setLoading(false); btn.classList.remove("spin"); }
    });
    $("#addBtn").addEventListener("click",(e)=>{ e.preventDefault(); addBooking(); });
    $("#clearDayBtn").addEventListener("click",(e)=>{ e.preventDefault(); clearDay(); });

    /* ========= パスコードゲート ========= */
    function setRemember(days){localStorage.setItem(GATE_KEY,String(Date.now()+days*24*60*60*1000));}
    function isRemembered(){return Number(localStorage.getItem(GATE_KEY)||0)>Date.now();}
    async function gateInit(){
      const gate=$("#gate"),btn=$("#gate-btn"),inp=$("#gate-pass"),msg=$("#gate-msg"),remember=$("#gate-remember");
      if(isRemembered()){ gate.remove(); return; }
      btn.addEventListener("click",async()=>{
        msg.textContent=""; const pass=inp.value||""; const hex=await sha256Hex(pass);
        if(hex===PASS_HASH){ if(remember.checked)setRemember(REMEMBER_DAYS); gate.remove(); }
        else { msg.textContent="パスコードが違います"; inp.focus(); }
      });
      inp.addEventListener("keydown",(e)=>{ if(e.key==="Enter") $("#gate-btn").click(); });
    }

    /* ========= 初期実行 ========= */
    (function init(){
      const q=getQueryDate();
      $("#date").value=q||todayStr();
      if(!q) setQueryDate($("#date").value);
      fillRooms(); fillTimes(); gateInit(); validateForm(); renderDay();
    })();

    /* ========= 画像モーダル（改善） ========= */
    let _lastFocus=null;
    function openImageModal(url, altText="機器画像"){
      const modal = $("#imageModal");
      const imgEl = $("#modalImg");
      const loading = $("#modalLoading");
      const errorBox = $("#modalError");

      _lastFocus = document.activeElement;

      errorBox.style.display = "none";
      loading.style.display = "flex";
      imgEl.style.visibility = "hidden";

      // 高解像度URLへ最適化
      const finalUrl = toBestDriveUrl(url);
      imgEl.src = finalUrl;
      imgEl.alt = altText;

      // 読み込み完了/失敗ハンドラ
      const onLoad = ()=>{
        loading.style.display = "none";
        imgEl.style.visibility = "visible";
        cleanup();
      };
      const onError = ()=>{
        loading.style.display = "none";
        errorBox.style.display = "block";
        cleanup();
      };
      function cleanup(){
        imgEl.removeEventListener("load", onLoad);
        imgEl.removeEventListener("error", onError);
      }
      imgEl.addEventListener("load", onLoad);
      imgEl.addEventListener("error", onError);

      modal.style.display = "flex";
      $("#modalCloseBtn").focus();
    }

    function closeImageModal(){
      const modal=$("#imageModal");
      const img=$("#modalImg");
      const loading = $("#modalLoading");
      const errorBox = $("#modalError");
      img.src=""; // 閉じたら空にする（次回のちらつき防止）
      img.style.visibility="hidden";
      loading.style.display="none";
      errorBox.style.display="none";
      modal.style.display="none";
      _lastFocus?.focus?.();
    }

    // オーバーレイクリックと Esc で閉じる
    $("#imageModal").addEventListener("click",(e)=>{ if(e.target.id==="imageModal") closeImageModal(); });
    document.addEventListener("keydown",(e)=>{ const modal=$("#imageModal"); if(e.key==="Escape" && modal.style.display==="flex") closeImageModal(); });
  </script>
</body>
</html>
